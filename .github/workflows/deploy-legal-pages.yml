name: Deploy legal pages to GitHub Pages

# Publishes ONLY the legal/ folder as the GitHub Pages site. With this workflow
# the documents are served at the site root, e.g.
#   https://miguelcaldasms.github.io/MCSMSForwarderMultiChannel/privacy-policy.html
#
# To use it: repo Settings → Pages → Source = "GitHub Actions".
# If you prefer the simpler branch deploy (Settings → Pages → Deploy from a
# branch → master → / root), you can delete this file; the pages would then be
# served under the /legal/ path instead.

on:
  push:
    branches: [master]
    paths:
      - "legal/**"
      - ".github/workflows/deploy-legal-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload legal/ as the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: legal

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
